apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shrikanth7/gitops-repo.git' # Update this!
    targetRevision: HEAD
    path: infrastructure/overlays/dev/argocd-config
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true