---
# Dev Environment Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shrikanth7/gitops-repo.git' # IMPORTANT: Update this URL!
    targetRevision: HEAD
    path: frontend/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc' # This means "deploy to the cluster ArgoCD is running in"
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # ArgoCD will automatically create the 'dev' namespace