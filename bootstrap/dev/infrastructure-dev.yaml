apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shrikanth7/gitops-repo.git' # Update this!
    targetRevision: HEAD
    path: infrastructure/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # Crucial: Prometheus CRDs are too large for standard apply