apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shrikanth7/gitops-repo.git'
    targetRevision: HEAD
    path: infrastructure/overlays/dev/prometheus # Notice the path now points specifically to the prometheus subfolder
  destination:
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true