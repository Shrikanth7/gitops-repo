---
# prod Environment Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shrikanth7/gitops-repo.git' # IMPORTANT: Update this URL!
    targetRevision: HEAD
    path: api-gateway/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc' # This means "deploy to the cluster ArgoCD is running in"
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # ArgoCD will automatically create the 'prod' namespace